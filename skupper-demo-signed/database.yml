apiVersion: v1
kind: Namespace
metadata:
  name: patient-portal-signed
  labels:
    app: patient-portal-signed
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: database
    demo: roadshow
  name: database
  namespace: patient-portal-signed
spec:
  replicas: 1
  selector:
    matchLabels:
      app: database
  template:
    metadata:
      labels:
        app: database
    spec:
      containers:
        - name: database
          image: quay.io/skupper/patient-portal-database
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: database
  name: database
  namespace: patient-portal-signed
spec:
  ports:
  - port: 5432
    protocol: TCP
    targetPort: 5432
  selector:
    app: database
---