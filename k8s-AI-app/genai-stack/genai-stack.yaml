  name: genai-stack-bot
  namespace: genai-stack
  labels:
    app: genai-stack-bot
    demo: roadshow
    repo: demo-apps
spec:
  to:
    kind: Service
    name: genai-stack-bot
  port:
    targetPort: http
  tls:
    termination: edge
---
